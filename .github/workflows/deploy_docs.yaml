name: Deploy Aggregated Docs to Custom Domain

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 2 AM UTC

permissions:
  contents: write

jobs:
  aggregate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout `dataartifex.github.io` Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch Docs for `dartfx-dcat` Repository
        run: |
          rm -rf docs/dartfx-dcat
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/dcat-toolkit.git docs/dartfx-dcat
          rm -rf docs/dartfx-dcat/.git

      - name: Fetch Docs for `dartfx-ddi` Repository
        run: |
          rm -rf docs/dartfx-ddi
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/ddi-toolkit.git docs/dartfx-ddi
          rm -rf docs/dartfx-ddi/.git

      - name: Fetch Docs for `dartfx-mtnards` Repository
        run: |
          rm -rf docs/dartfx-mtnards
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/mtnards-toolkit.git docs/dartfx-mtnards
          rm -rf docs/dartfx-mtnards/.git

      - name: Fetch Docs for `dartfx-postmanapi` Repository
        run: |
          rm -rf docs/dartfx-postmanapi
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/postman-api.git docs/dartfx-postmanapi
          rm -rf docs/dartfx-postmanapi/.git

      - name: Fetch Docs for `dartfx-postman` Repository
        run: |
          rm -rf docs/dartfx-postman
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/postman-api.git docs/dartfx-postman
          rm -rf docs/dartfx-postman/.git

      - name: Fetch Docs for `dartfx-rdf` Repository
        run: |
          rm -rf docs/dartfx-rdf
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/rdf-toolkit.git docs/dartfx-rdf
          rm -rf docs/dartfx-rdf/.git

      - name: Fetch Docs for `dartfx-socrata` Repository
        run: |
          rm -rf docs/dartfx-dcat
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/dcat-toolkit.git docs/dartfx-dcat
          rm -rf docs/dartfx-dcat/.git

      - name: Fetch Docs for `dartfx-unf` Repository
        run: |
          rm -rf docs/dartfx-unf
          git clone --depth 1 --branch gh-pages https://${{ secrets.HVDNET_DEV_ACCESS_TOKEN }}@github.com/dataartifex/dartfx-unf.git docs/dartfx-unf
          rm -rf docs/dartfx-unf/.git

      - name: Commit and Push Aggregated Docs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Update aggregated documentation" || echo "No changes to commit"
          git push origin main
